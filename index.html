<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Programme Submission | Anjuman-e-Huda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
            border-color: #1e3a8a;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-emerald-50 min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 bg-white rounded-2xl shadow-md px-6 py-3 mb-6">
                <div class="w-12 h-12 bg-emerald-600 text-white rounded-xl flex items-center justify-center text-3xl">🕌
                </div>
                <h1 class="heading-font text-3xl font-bold text-blue-900">Anjuman-e-Huda</h1>
            </div>
            <h2 class="text-4xl font-bold heading-font text-gray-900 mb-2">Eid Programme Submission</h2>
            <p class="text-gray-600">Fill the details of your participation / performance</p>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-3xl shadow-xl p-8 md:p-10">
            <form id="eidForm" class="space-y-8">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Student Name</label>
                        <input type="text" name="data[Student_Name]" placeholder="Full Name" required
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Student Class</label>

                        <select name="data[Student_Class]" required
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl bg-white">
                            <option value="">Select Class</option>
                            <option value="Class_001">Class_001</option>
                            <option value="Class_002">Class_002</option>
                            <option value="Class_003">Class_003</option>
                            <option value="Class_004">Class_004</option>
                            <option value="Class_005">Class_005</option>
                            <option value="Class_006">Class_006</option>
                            <option value="Class_007">Class_007</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Category</label>
                    <select name="data[Catogery]" required
                        class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl bg-white">
                        <option value="">Select Category</option>
                        <option value="Writting">Writting</option>
                        <option value="ReadingBook">ReadingBook</option>
                        <option value="Presentation">Presentation</option>
                        <option value="Public_Da'wa">Public_Da'wa</option>
                        <option value="CourseBox">CourseBox</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Task One*</label>
                        <input type="text" name="data[TaskOne]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl" required>
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Task Two*</label>
                        <input type="text" name="data[TaskTwo]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Task Three*</label>
                        <input type="text" name="data[TaskThree]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl" required>
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Task Four</label>
                        <input type="text" name="data[TaskFour]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Task Five</label>
                        <input type="text" name="data[TaskFive]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Joining From</label>
                        <select name="data[JoinngFrom]" id=""
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl bg-white">
                            <option value="">Select Option</option>
                            <option value="From_Dh">From_Dh</option>
                            <option value="From_Home">From_Home</option>
                        </select>
                    </div>

                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Start At</label>
                        <input type="date" name="data[Start_At]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Ended At</label>
                        <input type="date" name="data[Ended_At]"
                            class="input-focus w-full px-5 py-3 border border-gray-300 rounded-2xl">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Description / Remarks*</label>
                    <textarea name="data[Discription]" rows="4"
                        placeholder="Write short description or remarks about the performance..."
                        class="input-focus w-full px-5 py-4 border border-gray-300 rounded-3xl"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                </div>

                <div id="serverMsg" class="hidden rounded-2xl px-4 py-3 text-sm"></div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all">
                    <span id="btnText">Submit Programme Details</span>
                    <i id="btnSpinner" class="fa-solid fa-spinner animate-spin hidden"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('eidForm');
        const serverMsg = document.getElementById('serverMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            submitBtn.disabled = true;
            btnText.textContent = 'Submitting...';
            btnSpinner.classList.remove('hidden');
            serverMsg.classList.add('hidden');

            try {
                const response = await fetch('https://sheetdb.io/api/v1/uzdb33afnzsxw?sheet=EidProgrammes', {
                    method: 'POST',
                    body: new FormData(form),
                });

                if (response.ok) {
                    showMessage('✅ Submitted Successfully!', 'success');
                    form.reset();
                } else {
                    const err = await response.text();
                    console.error(err);
                    showMessage('❌ Failed to submit. Please try again.', 'error');
                }
            } catch (err) {
                console.error(err);
                showMessage('❌ Network error. Check your internet connection.', 'error');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Submit Programme Details';
                btnSpinner.classList.add('hidden');
            }
        });

        function showMessage(msg, type) {
            serverMsg.innerHTML = msg;
            serverMsg.classList.remove('hidden');
            if (type === 'success') {
                serverMsg.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-700');
            } else {
                serverMsg.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
            }
        }
    </script>
</body>

</html>
